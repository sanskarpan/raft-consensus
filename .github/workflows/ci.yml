name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily

env:
  # Primary toolchain; the module pins toolchain go1.26.5 via go.mod.
  GO_VERSION: "1.26.5"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Build/test matrix: primary toolchain plus the next minor for
        # forward-compat signal. Keep the primary first for coverage upload.
        go-version: ["1.26.5", "1.25.x"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -timeout 180s ./...

      - name: Test with coverage
        if: matrix.go-version == '1.26.5'
        run: go test -coverprofile=coverage.out -timeout 120s ./...

      - name: Upload coverage
        if: matrix.go-version == '1.26.5'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      # Upload to Codecov for per-PR coverage + delta reporting. Non-blocking:
      # requires CODECOV_TOKEN to be set (private repo); skipped/soft otherwise.
      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.26.5'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        # v9 of the action supports golangci-lint v2. v2.12.x is built with
        # go1.26, satisfying the go.mod `toolchain go1.26.5` (the v1 line was
        # built with go1.24 and refused to lint a 1.26-targeted module).
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        run: govulncheck ./...

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint, vuln]
    # Runs on PRs too (not just main) so Dockerfile changes are validated before
    # merge. Multi-arch to exercise the cross-compilation build path.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (multi-arch, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: raftd:latest
          build-args: VERSION=ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Nightly chaos/soak run, gated to the scheduled trigger (2 AM UTC cron above)
  # so it does not run on every push/PR. Previously lived in release.yml, which
  # only triggers on tags, so this job never actually ran.
  nightly:
    name: Nightly Chaos Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run lightweight chaos tests (also run on PR via ./...)
        run: go test -race -v -timeout 120s -run "TestLeaderFailover|TestFollowerRestart|TestNetworkPartitionRecovery" ./tools/chaos/
      - name: Run full testharness E2E (extended timeout)
        run: go test -race -v -timeout 300s ./tools/testharness/
      - name: Fuzz on-disk parsers (60s per target)
        run: |
          go test ./pkg/fsm/     -run='^$' -fuzz='^FuzzDecodeKVCommand$'    -fuzztime=60s
          go test ./pkg/storage/ -run='^$' -fuzz='^FuzzReadRecordAtBounded$' -fuzztime=60s
          go test ./pkg/storage/ -run='^$' -fuzz='^FuzzVerifySnapChecksum$'  -fuzztime=60s
          go test ./pkg/storage/ -run='^$' -fuzz='^FuzzWALRecovery$'         -fuzztime=60s
      - name: Benchmarks
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          go test -run='^$' -bench=. -benchmem -benchtime=50x -count=6 ./pkg/fsm/ ./pkg/storage/ ./pkg/transport/ | tee bench.txt
          benchstat bench.txt || true
      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: bench.txt
