name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.26.5"

jobs:
  # Primary release path: GoReleaser produces cross-platform archives,
  # checksums, and an SBOM, then publishes the GitHub Release.
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # syft powers the SBOM step configured in .goreleaser.yml.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Fallback / manual build path kept for parity and auditability. It builds
  # the same targets, archives them as tar.gz, and generates checksums.txt.
  binaries:
    name: Build binaries and checksums
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build, archive, and checksum
        run: |
          set -euo pipefail
          VERSION=${{ steps.version.outputs.VERSION }}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w \
            -X github.com/sanskarpan/raft-consensus/pkg/version.Version=${VERSION} \
            -X github.com/sanskarpan/raft-consensus/pkg/version.GitCommit=${COMMIT} \
            -X github.com/sanskarpan/raft-consensus/pkg/version.BuildDate=${DATE}"

          mkdir -p dist
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              workdir="dist/raft-consensus_${VERSION}_${GOOS}_${GOARCH}"
              mkdir -p "${workdir}"
              for BIN in raftd kvctl; do
                GOOS=${GOOS} GOARCH=${GOARCH} CGO_ENABLED=0 go build \
                  -trimpath -ldflags="${LDFLAGS}" \
                  -o "${workdir}/${BIN}" "./cmd/${BIN}"
              done
              cp README.md LICENSE "${workdir}/" 2>/dev/null || true
              tar -czf "dist/raft-consensus_${VERSION}_${GOOS}_${GOARCH}.tar.gz" \
                -C dist "raft-consensus_${VERSION}_${GOOS}_${GOARCH}"
              rm -rf "${workdir}"
            done
          done

          # Deterministic checksums over the archives.
          ( cd dist && sha256sum *.tar.gz > checksums.txt )
          echo "----- checksums.txt -----"
          cat dist/checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-binaries
          path: |
            dist/*.tar.gz
            dist/checksums.txt

  # Build, push, and cosign-sign a multi-arch container image to GHCR.
  docker-image:
    name: Build, push & sign image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless (OIDC)
    steps:
      - uses: actions/checkout@v7

      - name: Version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (linux/amd64,arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"
