node_id: node1
listen_addr: :8011
data_dir: ./data
election_tick: 10
heartbeat_tick: 1
cluster:
  - id: node1
    address: localhost:8011
  - id: node2
    address: localhost:8013
  - id: node3
    address: localhost:8015

# SPIFFE/SPIRE workload identity (cloud-native alternative to static TLS)
# Requires a SPIRE agent running on the host with socket at the configured path.
# When set, overrides tls_cert/tls_key/tls_ca.
# spiffe_socket: /run/spire/sockets/agent.sock
# spiffe_trust_domain: cluster.local
