{{- /*
tls-secret.yaml — TLS secret mounting helper for raft-consensus pods.

This template renders the volume and volumeMount configurations that inject
TLS certificates into raftd pods, depending on the tls.mode value:

  "disabled"     — no volume rendered
  "auto"         — no volume; raftd generates certs at startup in the data dir
  "cert-manager" — mounts per-node Certificate Secrets (cert-manager manages them)
  "manual"       — mounts a user-supplied Secret (certSecretName)
  "spiffe"       — mounts the SPIRE Workload API socket from the host

Usage in pod spec (StatefulSet/Deployment):
  Include the tls-volumes and tls-volume-mounts named templates.

Example:
  spec:
    volumes:
      {{- include "raft-cluster.tls-volumes" . | nindent 8 }}
    containers:
    - name: raftd
      volumeMounts:
        {{- include "raft-cluster.tls-volume-mounts" . | nindent 10 }}
*/}}

{{- define "raft-cluster.chart" -}}
{{- printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
{{- end }}

{{- /*
raft-cluster.tls-volumes renders the volumes block for TLS depending on mode.
*/}}
{{- define "raft-cluster.tls-volumes" -}}
{{- $mode := .Values.tls.mode | default "auto" }}

{{- if eq $mode "cert-manager" }}
{{- /*
  cert-manager mode: one Secret per node, named <release>-<nodeID>-tls.
  The pod uses its hostname (StatefulSet ordinal) to determine which Secret to mount.
  We mount all node Secrets; the init container or raftd selects the right one
  based on NODE_ID env var.  Alternatively, use pod-specific volume claims.
*/}}
{{- $replicas := (.Values.replicaCount | default 3) | int }}
{{- range $i := until $replicas }}
{{- $nodeID := printf "node%d" (add1 $i) }}
- name: tls-{{ $nodeID }}
  secret:
    secretName: {{ $.Release.Name }}-{{ $nodeID }}-tls
    defaultMode: 0600
    items:
      - key: tls.crt
        path: {{ $nodeID }}.crt
      - key: tls.key
        path: {{ $nodeID }}.key
      - key: ca.crt
        path: ca.crt
{{- end }}

{{- else if eq $mode "manual" }}
{{- /*
  manual mode: a single Secret supplied by the operator.
  Expected keys: tls.crt, tls.key, ca.crt
*/}}
{{- if .Values.tls.manual.certSecretName }}
- name: tls-manual
  secret:
    secretName: {{ .Values.tls.manual.certSecretName }}
    defaultMode: 0600
    items:
      - key: tls.crt
        path: node.crt
      - key: tls.key
        path: node.key
      - key: ca.crt
        path: ca.crt
{{- end }}

{{- else if eq $mode "spiffe" }}
{{- /*
  spiffe mode: mount the SPIRE Workload API socket from the host.
  The socket is provided by the SPIRE agent DaemonSet running on each node.
*/}}
- name: spiffe-workload-api
  hostPath:
    path: {{ dir .Values.tls.spiffe.workloadAPISocket }}
    type: DirectoryOrCreate

{{- end }}{{/* mode switch */}}
{{- end }}{{/* define tls-volumes */}}


{{- /*
raft-cluster.tls-volume-mounts renders the volumeMounts block for TLS.
*/}}
{{- define "raft-cluster.tls-volume-mounts" -}}
{{- $mode := .Values.tls.mode | default "auto" }}

{{- if eq $mode "cert-manager" }}
{{- /*
  cert-manager mode: mount the correct node's Secret at /tls/<nodeID>/.
  raftd is configured to read tls_cert: /tls/<nodeID>/<nodeID>.crt etc.
  In a StatefulSet, NODE_ID is derived from the pod name suffix.
*/}}
{{- $replicas := (.Values.replicaCount | default 3) | int }}
{{- range $i := until $replicas }}
{{- $nodeID := printf "node%d" (add1 $i) }}
- name: tls-{{ $nodeID }}
  mountPath: /tls/{{ $nodeID }}
  readOnly: true
{{- end }}

{{- else if eq $mode "manual" }}
{{- if .Values.tls.manual.certSecretName }}
- name: tls-manual
  mountPath: /tls/manual
  readOnly: true
{{- end }}

{{- else if eq $mode "spiffe" }}
- name: spiffe-workload-api
  mountPath: {{ dir .Values.tls.spiffe.workloadAPISocket }}
  readOnly: true

{{- end }}{{/* mode switch */}}
{{- end }}{{/* define tls-volume-mounts */}}


{{- /*
raft-cluster.tls-env renders environment variables that tell raftd where to
find its cert/key/CA depending on the TLS mode.
*/}}
{{- define "raft-cluster.tls-env" -}}
{{- $mode := .Values.tls.mode | default "auto" }}

{{- if eq $mode "disabled" }}
- name: RAFT_TLS_MODE
  value: "disabled"

{{- else if eq $mode "auto" }}
- name: RAFT_TLS_MODE
  value: "auto"

{{- else if eq $mode "cert-manager" }}
- name: RAFT_TLS_MODE
  value: "manual"
# raftd selects the cert at /tls/<NODE_ID>/<NODE_ID>.crt based on NODE_ID.
- name: RAFT_TLS_CERT_DIR
  value: "/tls"
- name: RAFT_TLS_CA
  value: "/tls/$(NODE_ID)/ca.crt"

{{- else if eq $mode "manual" }}
- name: RAFT_TLS_MODE
  value: "manual"
- name: RAFT_TLS_CERT
  value: "/tls/manual/node.crt"
- name: RAFT_TLS_KEY
  value: "/tls/manual/node.key"
- name: RAFT_TLS_CA
  value: "/tls/manual/ca.crt"

{{- else if eq $mode "spiffe" }}
- name: RAFT_TLS_MODE
  value: "spiffe"
- name: SPIFFE_ENDPOINT_SOCKET
  value: "unix://{{ .Values.tls.spiffe.workloadAPISocket }}"

{{- end }}{{/* mode switch */}}
{{- end }}{{/* define tls-env */}}
