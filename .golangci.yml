# golangci-lint configuration for raft-consensus.
# Compatible with golangci-lint v1.6x (issues.exclude-dirs schema).
run:
  timeout: 5m
  tests: true
  # Build tags used across the tree (add here if new ones are introduced).
  build-tags: []

linters:
  # Start from a disabled baseline and enable an explicit, sensible set.
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gosec

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment  # too noisy for this codebase
  misspell:
    locale: US
  gosec:
    # G104 (unhandled errors) overlaps errcheck; keep the rest.
    excludes:
      - G104
  staticcheck:
    checks: ["all"]

issues:
  # Exclude generated and vendored/JS directories from analysis.
  exclude-dirs:
    - ui
    - node_modules
    - proto            # generated protobuf stubs (*.pb.go)
    - data
  exclude-rules:
    # Test files legitimately use weak randomness and unchecked errors.
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  # Show all issues rather than the default per-linter caps.
  max-issues-per-linter: 0
  max-same-issues: 0
