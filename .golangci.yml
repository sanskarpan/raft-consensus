# golangci-lint configuration for raft-consensus (schema v2).
# Migrated from v1 with `golangci-lint migrate`; see the migration guide:
# https://golangci-lint.run/docs/product/migration-guide/
version: "2"
run:
  # Analyze test files too.
  tests: true
linters:
  # Start from a disabled baseline and enable an explicit, sensible set.
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    errcheck:
      # Conventional best-effort I/O whose error is not actionable at the call
      # site (HTTP response writes, JSON encoding to an already-committed
      # ResponseWriter, logger flush on shutdown). Enforcing these adds noise
      # without catching real bugs.
      exclude-functions:
        - (*encoding/json.Encoder).Encode
        - (net/http.ResponseWriter).Write
        - (*go.uber.org/zap.Logger).Sync
    gosec:
      excludes:
        # G104 overlaps errcheck (unhandled errors); errcheck owns that.
        - G104
        # G115 (integer overflow on conversions) is overwhelmingly false-positive
        # in this codebase's binary encode/decode paths (masked byte extraction,
        # length<->offset conversions). Real conversions are bounded at the call
        # site; enforcing G115 here is pure noise.
        - G115
        # G404 (weak RNG) fires on election/backoff jitter and the lincheck tool,
        # none of which are security-sensitive. Cryptographic randomness is used
        # where it matters (tokens, IDs) and is not flagged there.
        - G404
    govet:
      enable-all: true
      disable:
        # Both intentionally off: too noisy to enforce as a gate here and not part
        # of govet's default set.
        - fieldalignment # struct field ordering micro-optimizations
        - shadow # variable shadowing, dominated by idiomatic `err :=` reuse
    misspell:
      locale: US
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test files legitimately use weak randomness and unchecked errors.
      - linters:
          - errcheck
          - gosec
        path: _test\.go
    paths:
      - ui
      - node_modules
      - proto # generated protobuf stubs (*.pb.go)
      - data
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
