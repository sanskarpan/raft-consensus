syntax = "proto3";

package raft;

option go_package = "./proto;raftpb";

message ServerAddress {
    string address = 1;
}

message ServerID {
    string id = 1;
}

message Configuration {
    repeated Server servers = 1;
}

message Server {
    string id = 1;
    string address = 2;
    bool learner = 3;
}

message ConfigurationEntry {
    uint64 index = 1;
    uint64 term = 2;
    Configuration configuration = 3;
    Configuration old_configuration = 4;
}

enum EntryType {
    EntryNormal = 0;
    EntryConfiguration = 1;
    EntrySnapshot = 2;
}

message LogEntry {
    uint64 term = 1;
    uint64 index = 2;
    EntryType type = 3;
    bytes data = 4;
}

message RequestVoteRequest {
    uint64 term = 1;
    string candidate_id = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term = 4;
    bool pre_vote = 5;
}

message RequestVoteResponse {
    uint64 term = 1;
    bool vote_granted = 2;
    string reject_reason = 3;
}

message AppendEntriesRequest {
    uint64 term = 1;
    string leader_id = 2;
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
    repeated LogEntry entries = 5;
    uint64 leader_commit = 6;
}

message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    uint64 conflict_index = 3;
    uint64 conflict_term = 4;
}

message InstallSnapshotRequest {
    uint64 term = 1;
    string leader_id = 2;
    uint64 last_included_index = 3;
    uint64 last_included_term = 4;
    uint64 offset = 5;
    bytes data = 6;
    bool done = 7;
}

message InstallSnapshotResponse {
    uint64 term = 1;
}

message TimeoutNowRequest {
    string server_id = 1;
}

message TimeoutNowResponse {
}

message Message {
    string from = 1;
    string to = 2;
    uint64 term = 3;
    string type = 4;
    RequestVoteRequest request_vote = 5;
    RequestVoteResponse request_vote_response = 6;
    AppendEntriesRequest append_entries = 7;
    AppendEntriesResponse append_entries_response = 8;
    InstallSnapshotRequest install_snapshot = 9;
    InstallSnapshotResponse install_snapshot_response = 10;
}

service RaftService {
    rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
    rpc InstallSnapshot(stream InstallSnapshotRequest) returns (InstallSnapshotResponse);
    rpc TimeoutNow(TimeoutNowRequest) returns (TimeoutNowResponse);
    rpc MessageStream(stream Message) returns (stream Message);
}

service RaftAdmin {
    rpc GetConfiguration(ConfigurationRequest) returns (ConfigurationResponse);
    rpc AddServer(AddServerRequest) returns (AddServerResponse);
    rpc RemoveServer(RemoveServerRequest) returns (RemoveServerResponse);
    rpc PromoteLearner(PromoteLearnerRequest) returns (PromoteLearnerResponse);
    rpc CreateSnapshot(SnapshotRequest) returns (SnapshotResponse);
    rpc GetSnapshot(GetSnapshotRequest) returns (stream SnapshotChunk);
    rpc TransferLeadership(TransferLeadershipRequest) returns (TransferLeadershipResponse);
}

message ConfigurationRequest {}

message ConfigurationResponse {
    Configuration configuration = 1;
    uint64 index = 2;
    uint64 term = 3;
}

message AddServerRequest {
    string id = 1;
    string address = 2;
    bool learner = 3;
}

message AddServerResponse {
    bool success = 1;
    string error = 2;
}

message RemoveServerRequest {
    string id = 1;
}

message RemoveServerResponse {
    bool success = 1;
    string error = 2;
}

message PromoteLearnerRequest {
    string id = 1;
}

message PromoteLearnerResponse {
    bool success = 1;
    string error = 2;
}

message SnapshotRequest {
    bool stop = 1;
}

message SnapshotResponse {
    bool success = 1;
    string error = 2;
}

message GetSnapshotRequest {
    string id = 1;
}

message SnapshotChunk {
    bytes data = 1;
    uint64 offset = 2;
    bool done = 3;
    SnapshotMetadata metadata = 4;
}

message SnapshotMetadata {
    string id = 1;
    uint64 index = 2;
    uint64 term = 3;
    Configuration configuration = 4;
    uint64 version = 5;
}

message TransferLeadershipRequest {
    string target_id = 1;
}

message TransferLeadershipResponse {
    bool success = 1;
    string error = 2;
}
