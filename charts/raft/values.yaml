replicaCount: 3

image:
  repository: raftd
  pullPolicy: IfNotPresent
  # L10: pin an explicit, reproducible version tag instead of the mutable
  # "latest" (supply-chain risk). Override per deployment; prefer a digest.
  tag: "0.1.0"

service:
  type: ClusterIP
  raftPort: 8080
  httpPort: 8081

# Priority class for the Raft pods. Use a high-priority class for critical
# control-plane workloads to prevent preemption during node pressure.
# Example: priorityClassName: system-cluster-critical
priorityClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi

config:
  electionTick: 10
  heartbeatTick: 1
  # adminToken, when set, is stored in a chart-managed Secret (not the
  # ConfigMap) and injected as $ADMIN_TOKEN. Prefer referencing an existing
  # Secret via existingSecret/existingSecretKey.
  adminToken: ""
  existingSecret: ""
  existingSecretKey: admin-token
  # Set true ONLY for local/dev demos with no token; fails closed otherwise.
  allowNoAuth: false
  # Step down if a quorum of voters cannot be reached within an election
  # timeout (bounds partitioned-minority leadership). Recommended in production.
  checkQuorum: false

# Graceful shutdown budget. raftd transfers leadership and drains HTTP on
# SIGTERM; this must exceed that internal budget (~10s drain + transfer).
terminationGracePeriodSeconds: 40

# Pod anti-affinity keeps quorum members off the same node. Default is SOFT
# (preferred) so scheduling still succeeds on small clusters; set a full
# affinity block here to override (e.g. requiredDuringScheduling for hard
# anti-affinity). Leave empty to use the default soft rule.
affinity: {}

# Spread pods across failure domains (e.g. zones). Empty uses a built-in
# default that spreads across zones with maxSkew=1 for production deployments.
# Example override:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels: { app: <release>-raft }
topologySpreadConstraints: []

# Additional labels and annotations applied to every pod.
podLabels: {}
podAnnotations: {}

# Extra environment variables injected into the raftd container.
extraEnv: []
# - name: MY_VAR
#   value: my-value

# Extra volume definitions and their corresponding volume mounts.
extraVolumes: []
# - name: my-volume
#   configMap:
#     name: my-config
extraVolumeMounts: []
# - name: my-volume
#   mountPath: /etc/my-config
#   readOnly: true

# Update strategy for the StatefulSet. RollingUpdate is the default and safe
# for Raft since each pod restarts independently. OnDelete gives manual control.
updateStrategy: RollingUpdate

# PodDisruptionBudget: cap voluntary disruptions so a node drain/upgrade cannot
# evict enough quorum members to break the cluster.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# NetworkPolicy controls inter-pod traffic. When enabled, only traffic on the
# Raft and HTTP ports from the same namespace is permitted.
networkPolicy:
  enabled: false

# ServiceMonitor for the Prometheus Operator (requires its CRD).
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}
  # Bearer token for scraping the auth-gated /metrics, e.g.
  #   bearerTokenSecret: { name: my-secret, key: token }
  bearerTokenSecret: {}

# PrometheusRule (requires the Prometheus Operator CRD). When enabled, ships
# alerting rules for leader loss/flapping, apply/replication lag, WAL fsync
# latency, commit latency, and rejection rate.
prometheusRule:
  enabled: false
  labels: {}
