apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-raft-config
data:
  config.yaml: |
    node_id: "${HOSTNAME}"
    listen_addr: ":{{ .Values.service.raftPort }}"
    http_addr: ":{{ .Values.service.httpPort }}"
    data_dir: /data
    election_tick: {{ .Values.config.electionTick }}
    heartbeat_tick: {{ .Values.config.heartbeatTick }}
    # Sourced from the $ADMIN_TOKEN env (a Secret), not rendered in plaintext.
    admin_token: "${ADMIN_TOKEN}"
    allow_no_auth: {{ .Values.config.allowNoAuth }}
    check_quorum: {{ .Values.config.checkQuorum }}
    cluster:
    {{- range $i := until (.Values.replicaCount | int) }}
      - id: {{ $.Release.Name }}-raft-{{ $i }}
        address: {{ $.Release.Name }}-raft-{{ $i }}.{{ $.Release.Name }}-raft-headless:{{ $.Values.service.raftPort }}
        http_address: {{ $.Release.Name }}-raft-{{ $i }}.{{ $.Release.Name }}-raft-headless:{{ $.Values.service.httpPort }}
    {{- end }}
