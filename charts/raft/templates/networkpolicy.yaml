{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-raft
  labels:
    app: {{ .Release.Name }}-raft
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-raft
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-raft
      ports:
        - port: {{ .Values.service.raftPort }}
          protocol: TCP
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.service.httpPort }}
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-raft
      ports:
        - port: {{ .Values.service.raftPort }}
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
{{- end }}
